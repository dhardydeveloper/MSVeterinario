server:
  port: 8083

spring:
  application:
    name: agenda

  datasource:
    url: jdbc:mysql://localhost:3306/agenda
    username: root
    password:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

springdoc:
  api-docs:
    enabled: true
    version: openapi_3_0
  swagger-ui:
    enabled: true


eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/