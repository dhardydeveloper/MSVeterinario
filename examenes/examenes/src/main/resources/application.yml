server:
  port: 8085

spring:
    application:
        name: examenes

    datasource:
        url: jdbc:mysql://localhost:3306/examenes
        username: root
        password: ""

    jpa:
        hibernate:
            ddl-auto: update
        show-sql: true

springdoc:
  api-docs:
    enabled: true
    version: openapi_3_0
  swagger-ui:
    enabled: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/