server:
    port: 8086

spring:
  application:
    name: fichaclinica

  datasource:
    url: jdbc:mysql://localhost:3306/fichaclinica
    username: root
    password: ""


  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

springdoc:
  api-docs:
    enabled: true
    version: openapi_3_0
  swagger-ui:
    enabled: true


eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true        # ← esto
    instance-id: ${spring.application.name}:${server.port}  # ← y esto

