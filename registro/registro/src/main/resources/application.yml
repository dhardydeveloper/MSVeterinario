server:
  port: 8081

spring:
  application:
    name: registro

  datasource:
    url: jdbc:mysql://localhost:3306/registro
    username: root
    password: ""

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

springdoc:
  api-docs:
    enabled: true
    version: openapi_3_0
  swagger-ui:
    enabled: true


eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

