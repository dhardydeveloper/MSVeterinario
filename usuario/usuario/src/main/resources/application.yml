server:
  port: 8088

spring:
  application:
    name: usuario

  datasource:
    url: jdbc:mysql://localhost:3306/usuario
    username: root
    password: ""

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

springdoc:
  api-docs:
    enabled: true
    version: openapi_3_0
  swagger-ui:
    enabled: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
      
